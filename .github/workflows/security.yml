name: Security

# A public repository is scraped within minutes of a push, so scanning has to
# happen before merge, not on a nightly cron. The scheduled run exists to catch
# advisories published against dependencies we already shipped.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks diffs commits, so a shallow clone silently scans nothing.
          fetch-depth: 0

      - name: Scan history and diff for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fails the build on high/critical only. Moderate findings in dev
      # dependencies are noise that trains people to ignore this job.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
